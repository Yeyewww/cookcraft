<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#f5e6d0"/>
  <!-- Glass body -->
  <rect x="14" y="16" width="36" height="40" rx="4" fill="#d8ece8"/>
  <rect x="16" y="18" width="32" height="36" rx="3" fill="#e8f4f0"/>
  <!-- Light green drink -->
  <rect x="16" y="28" width="32" height="26" rx="2" fill="#a8d8b0"/>
  <rect x="16" y="34" width="32" height="20" rx="2" fill="#88c898"/>
  <!-- Ice cubes -->
  <rect x="20" y="30" width="6" height="6" fill="#c8ece0"/>
  <rect x="34" y="32" width="6" height="6" fill="#c8ece0"/>
  <!-- Lime slice (floating) -->
  <rect x="28" y="22" width="10" height="10" rx="5" fill="#5aaa3a"/>
  <rect x="30" y="24" width="6" height="6" rx="3" fill="#8acc5a"/>
  <rect x="32" y="26" width="2" height="2" fill="#f5f0e0"/>
  <!-- Mint leaves -->
  <rect x="38" y="20" width="3" height="4" fill="#3a8a3a"/>
  <rect x="39" y="18" width="3" height="4" fill="#4a9a4a"/>
  <!-- Straw -->
  <rect x="38" y="6" width="3" height="26" fill="#e0e8e0"/>
</svg>
