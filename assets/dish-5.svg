<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#f5e6d0"/>
  <!-- Cup body -->
  <rect x="16" y="18" width="32" height="36" rx="3" fill="#e8dcc8"/>
  <rect x="18" y="20" width="28" height="32" rx="2" fill="#f5f0e8"/>
  <!-- Top white/cream layer -->
  <rect x="18" y="20" width="28" height="10" fill="#f8f4ec"/>
  <!-- Matcha green middle layer -->
  <rect x="18" y="30" width="28" height="12" fill="#6aaa4a"/>
  <rect x="18" y="30" width="28" height="4" fill="#7aba5a"/>
  <!-- Bottom darker green layer -->
  <rect x="18" y="42" width="28" height="10" fill="#4a8a3a"/>
  <!-- Cup handle -->
  <rect x="46" y="24" width="6" height="14" rx="3" fill="#e8dcc8"/>
  <rect x="48" y="26" width="3" height="10" rx="1" fill="#f0e8d8"/>
  <!-- Straw -->
  <rect x="36" y="6" width="3" height="30" fill="#e8dcc8"/>
  <rect x="36" y="6" width="3" height="6" fill="#f0e8d8"/>
  <!-- Cream top foam highlight -->
  <rect x="22" y="22" width="6" height="2" fill="#ffffff" opacity="0.5"/>
</svg>
