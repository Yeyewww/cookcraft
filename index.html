<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookCraft · 像素烹饪技能</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ========== 全局重置 & 像素基调 ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg-page: #f5efe0;
  --bg-card: #faf6ed;
  --bg-card-hover: #f0e9d8;
  --wood-light: #e8d5b7;
  --wood-dark: #c4a97d;
  --wood-border: #8b7355;
  --accent-green: #6b8f3a;
  --accent-amber: #d4a843;
  --accent-red: #c45a4a;
  --text-dark: #4a3729;
  --text-muted: #8b7a66;
  --star-gold: #f0b429;
  --star-empty: #d4c9b0;
  --pixel-size: 4px;
}

@font-face {
  font-family: 'Minecraft';
  src: local('Press Start 2P'), local('Courier New');
}

body {
  font-family: 'Press Start 2P', 'Minecraft', monospace;
  background: var(--bg-page);
  background-image:
    linear-gradient(45deg, #ede4d0 25%, transparent 25%),
    linear-gradient(-45deg, #ede4d0 25%, transparent 25%);
  background-size: 32px 32px;
  color: var(--text-dark);
  min-height: 100vh;
  padding: 20px;
  image-rendering: pixelated;
}

/* ========== 像素边框 ========== */
.pixel-border {
  border: 4px solid var(--wood-border);
  border-radius: 0;
  box-shadow:
    inset -4px -4px 0 rgba(0,0,0,0.12),
    inset 4px 4px 0 rgba(255,255,255,0.25),
    -2px -2px 0 var(--wood-border),
    2px 2px 0 var(--wood-border);
}
.pixel-border-sm {
  border: 3px solid var(--wood-border);
  box-shadow:
    inset -3px -3px 0 rgba(0,0,0,0.1),
    inset 3px 3px 0 rgba(255,255,255,0.2);
}
.pixel-btn {
  font-family: inherit;
  font-size: 10px;
  border: 3px solid var(--wood-border);
  background: var(--wood-light);
  color: var(--text-dark);
  padding: 8px 16px;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--wood-dark);
  transition: all 0.06s steps(2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: relative;
}
.pixel-btn:hover {
  transform: translateY(2px);
  box-shadow: 0 2px 0 var(--wood-dark);
  background: var(--bg-card-hover);
}
.pixel-btn:active {
  transform: translateY(4px);
  box-shadow: none;
}

/* ========== 顶部横幅 ========== */
.header {
  max-width: 1000px;
  margin: 0 auto 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  background: var(--bg-card);
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  right: 0;
  height: 4px;
  background: repeating-linear-gradient(
    90deg, var(--accent-green) 0px, var(--accent-green) 8px,
    var(--accent-amber) 8px, var(--accent-amber) 16px
  );
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--accent-green);
  border: 3px solid var(--wood-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.logo h1 {
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--accent-green);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.avatar-box {
  width: 40px;
  height: 40px;
  border: 3px solid var(--wood-border);
  overflow: hidden;
  background: #f0e9d8;
}
.avatar-box svg { width: 100%; height: 100%; display: block; }

/* ========== 统计栏 ========== */
.stats-bar {
  max-width: 1000px;
  margin: 0 auto 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr) auto;
  gap: 8px;
  padding: 12px 20px;
  background: var(--bg-card);
}
.stat-item {
  text-align: center;
  padding: 8px;
}
.stat-number {
  font-size: 18px;
  color: var(--accent-green);
  display: block;
  margin-bottom: 6px;
}
.stat-label {
  font-size: 8px;
  color: var(--text-muted);
  line-height: 1.6;
}
.stat-divider {
  width: 2px;
  background: var(--wood-light);
  margin: 4px 0;
}

/* ========== 分类筛选 ========== */
.filter-bar {
  max-width: 1000px;
  margin: 0 auto 16px;
  display: flex;
  gap: 6px;
  padding: 0 4px;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: inherit;
  font-size: 9px;
  padding: 6px 14px;
  border: 3px solid var(--wood-border);
  background: var(--bg-card);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.06s steps(2);
  opacity: 0.7;
}
.filter-btn:hover { opacity: 0.9; }
.filter-btn.active {
  background: var(--accent-green);
  border-color: var(--accent-green);
  color: #fff;
  opacity: 1;
}
.filter-btn i { margin-right: 4px; }

/* ========== 技能网格 ========== */
.skill-grid {
  max-width: 1000px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

/* ========== 技能卡片 ========== */
.skill-card {
  background: var(--bg-card);
  padding: 16px 14px 14px;
  cursor: pointer;
  transition: all 0.1s steps(2);
  position: relative;
  overflow: hidden;
}
.skill-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: repeating-linear-gradient(
    90deg,
    var(--accent-green) 0px, var(--accent-green) 8px,
    transparent 8px, transparent 16px
  );
}
.skill-card:hover {
  transform: translateY(-4px);
  box-shadow:
    inset -4px -4px 0 rgba(0,0,0,0.12),
    inset 4px 4px 0 rgba(255,255,255,0.25),
    -4px -4px 0 var(--wood-border),
    4px 4px 0 var(--wood-border);
}
.skill-card .dish-img {
  width: 72px;
  height: 72px;
  margin: 0 auto 12px;
  display: block;
  image-rendering: pixelated;
}
.skill-card .dish-img svg { width: 100%; height: 100%; display: block; }
.skill-card h3 {
  font-size: 10px;
  text-align: center;
  margin-bottom: 8px;
  line-height: 1.5;
  color: var(--text-dark);
}
.skill-card .stars {
  text-align: center;
  margin-bottom: 8px;
  font-size: 10px;
  letter-spacing: 2px;
}
.skill-card .stars .filled { color: var(--star-gold); }
.skill-card .stars .empty { color: var(--star-empty); }
.skill-card .tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
}
.skill-card .tag {
  font-size: 7px;
  padding: 3px 7px;
  background: var(--wood-light);
  border: 2px solid var(--wood-dark);
  color: var(--text-muted);
  line-height: 1;
}
.skill-card .tag.proficient { background: #dce8c5; border-color: var(--accent-green); color: var(--accent-green); }
.skill-card .tag.learning { background: #f5e6c5; border-color: var(--accent-amber); color: #b8860b; }
.skill-card .card-footer {
  margin-top: 10px;
  padding-top: 8px;
  border-top: 2px dashed var(--wood-light);
  font-size: 7px;
  color: var(--text-muted);
  text-align: center;
}
.skill-card .empty-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 180px;
  opacity: 0.5;
  border: 3px dashed var(--wood-dark);
}
.skill-card .empty-slot .plus {
  font-size: 32px;
  color: var(--wood-dark);
  margin-bottom: 8px;
  line-height: 1;
}
.skill-card .empty-slot span {
  font-size: 8px;
  color: var(--text-muted);
}
.skill-card.new-dish::after {
  content: 'NEW!';
  position: absolute;
  top: 8px;
  right: -20px;
  background: var(--accent-red);
  color: #fff;
  font-size: 7px;
  padding: 2px 20px;
  transform: rotate(45deg);
}

/* ========== Modal ========== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-card);
  max-width: 520px;
  width: 100%;
  padding: 28px 24px 24px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 28px;
  height: 28px;
  border: 3px solid var(--wood-border);
  background: var(--bg-card);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
}
.modal-close:hover { background: var(--accent-red); color: #fff; border-color: var(--accent-red); }
.modal-top {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  align-items: flex-start;
}
.modal-dish-img {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
  border: 3px solid var(--wood-dark);
  background: var(--bg-page);
}
.modal-dish-img svg { width: 100%; height: 100%; display: block; }
.modal-info { flex: 1; }
.modal-info h2 {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--text-dark);
}
.modal-info .category-label {
  font-size: 8px;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: block;
}
.modal-info .stars { font-size: 14px; letter-spacing: 3px; margin-bottom: 4px; }
.modal-info .stars .filled { color: var(--star-gold); }
.modal-info .stars .empty { color: var(--star-empty); }
.modal-info .exp-label {
  font-size: 8px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 6px;
}

/* 熟练度进度条 */
.exp-bar-wrapper {
  width: 100%;
  height: 14px;
  background: var(--wood-light);
  border: 3px solid var(--wood-dark);
  position: relative;
  overflow: hidden;
}
.exp-bar-fill {
  height: 100%;
  background: repeating-linear-gradient(
    90deg,
    var(--accent-green) 0px, var(--accent-green) 6px,
    transparent 6px, transparent 10px
  );
  background-color: var(--accent-green);
  transition: width 0.3s steps(8);
}
.exp-bar-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  color: var(--text-dark);
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
}

/* 笔记区 */
.modal-section {
  margin-top: 16px;
}
.modal-section h4 {
  font-size: 9px;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.notes-list {
  list-style: none;
}
.notes-list li {
  font-size: 8px;
  padding: 6px 8px;
  background: var(--bg-page);
  margin-bottom: 4px;
  border: 2px solid var(--wood-light);
  display: flex;
  gap: 6px;
  align-items: flex-start;
  line-height: 1.5;
}
.notes-list li .note-type {
  font-size: 6px;
  padding: 2px 5px;
  background: var(--accent-amber);
  color: #fff;
  flex-shrink: 0;
  margin-top: 1px;
}
.notes-list li .note-type.tip { background: var(--accent-green); }
.notes-list li .note-type.fail { background: var(--accent-red); }

/* ========== 赛季挑战 ========== */
.challenge-bar {
  max-width: 1000px;
  margin: 20px auto 0;
  padding: 14px 20px;
  background: var(--bg-card);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.challenge-left { display: flex; align-items: center; gap: 14px; }
.challenge-icon {
  font-size: 24px;
  width: 40px;
  height: 40px;
  background: #f5e6c5;
  border: 3px solid var(--accent-amber);
  display: flex;
  align-items: center;
  justify-content: center;
}
.challenge-text h3 { font-size: 10px; color: var(--text-dark); margin-bottom: 4px; }
.challenge-text p { font-size: 7px; color: var(--text-muted); line-height: 1.5; }
.challenge-progress {
  display: flex;
  align-items: center;
  gap: 12px;
}
.challenge-progress .exp-bar-wrapper { width: 120px; }
.challenge-progress .stat-number { font-size: 14px; }

/* ========== 社区入口 ========== */
.community-entry {
  max-width: 1000px;
  margin: 12px auto 0;
  text-align: center;
  padding: 12px;
}
.community-entry p {
  font-size: 8px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.community-entry a {
  color: var(--accent-green);
  text-decoration: none;
  border-bottom: 2px dashed var(--accent-green);
}
.community-entry a:hover { color: var(--accent-red); border-bottom-color: var(--accent-red); }

/* ========== 响应式 ========== */
@media (max-width: 600px) {
  body { padding: 12px; }
  .header { flex-direction: column; gap: 12px; text-align: center; }
  .header-right { width: 100%; justify-content: center; }
  .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 8px; }
  .stat-number { font-size: 14px; }
  .stat-label { font-size: 7px; }
  .skill-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .modal-top { flex-direction: column; align-items: center; text-align: center; }
  .challenge-bar { flex-direction: column; text-align: center; }
  .challenge-left { flex-direction: column; }
  .stat-divider:last-child { display: none; }
}
</style>
</head>

<script>
// ========== 数据 ==========
const dishSvgs = {};
const svgFiles = ['dish-1','dish-2','dish-3','dish-4','dish-5','dish-6','dish-7','dish-8','dish-9'];
let svgLoaded = 0;

async function loadSvgs() {
  for (const name of svgFiles) {
    try {
      const resp = await fetch(`assets/${name}.svg`);
      const text = await resp.text();
      dishSvgs[name] = text;
    } catch (e) {
      // fallback inline SVG
    }
  }
  renderGrid();
}

const skills = [
  {
    id: 1, name: '西红柿炒蛋', category: '热菜',
    svg: 'dish-1', stars: 4, exp: 85,
    tags: ['拿手好菜', '家常'],
    lastCooked: '3天前',
    notes: [
      { type: 'tip', text: '番茄先去皮炒出沙，口感更好' },
      { type: 'tip', text: '鸡蛋加少许水打散，更嫩滑' },
    ]
  },
  {
    id: 2, name: '可乐鸡翅', category: '热菜',
    svg: 'dish-2', stars: 3, exp: 60,
    tags: ['翻过车', '宴客'],
    lastCooked: '1周前',
    notes: [
      { type: 'fail', text: '第一次火太大糊了😅 改中小火收汁就好了' },
      { type: 'tip', text: '加两片姜和八角，层次感翻倍' },
    ]
  },
  {
    id: 3, name: '酸辣土豆丝', category: '热菜',
    svg: 'dish-3', stars: 4, exp: 75,
    tags: ['拿手好菜', '快手'],
    lastCooked: '5天前',
    notes: [
      { type: 'tip', text: '切完用冷水泡掉淀粉，才会脆' },
      { type: 'fail', text: '醋要沿锅边淋，高温激发香味' },
    ]
  },
  {
    id: 4, name: '蛋炒饭', category: '主食',
    svg: 'dish-4', stars: 5, exp: 95,
    tags: ['拿手好菜', '招牌'],

// ========== 空位占位 ==========
const emptySlots = [
  { category: '热菜', hint: '学一道新热菜' },
  { category: '甜品', hint: '想学做什么甜品？' },
  { category: '饮品', hint: '解锁一杯夏日饮品' },
];

// ========== 渲染 ==========
let currentFilter = 'all';

function starsHTML(level) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    html += `<span class="${i <= level ? 'filled' : 'empty'}">✦</span>`;
  }
  return html;
}

function getSvgContent(dishKey) {
  return dishSvgs[dishKey] || '';
}

function renderGrid() {
  const grid = document.getElementById('skill-grid');
  const filtered = currentFilter === 'all'
    ? skills
    : skills.filter(s => s.category === currentFilter);
  const categorySlots = currentFilter === 'all'
    ? emptySlots
    : emptySlots.filter(s => s.category === currentFilter);

  grid.innerHTML = '';

  filtered.forEach(skill => {
    const svgContent = getSvgContent(skill.svg);
    const isNew = skill.exp < 50;
    grid.innerHTML += `
      <div class="skill-card pixel-border ${isNew ? 'new-dish' : ''}" onclick="openModal(${skill.id})">
        <div class="dish-img">${svgContent}</div>
        <h3>${skill.name}</h3>
        <div class="stars">${starsHTML(skill.stars)}</div>
        <div class="tags">
          ${skill.tags.map(t => {
            let cls = 'tag';
            if (t === '拿手好菜' || t === '招牌') cls += ' proficient';
            else if (t === '学习中') cls += ' learning';
            return `<span class="${cls}">${t}</span>`;
          }).join('')}
        </div>
        <div class="card-footer">上次做 · ${skill.lastCooked}</div>
      </div>
    `;
  });

  // 空位占位
  categorySlots.forEach(slot => {
    grid.innerHTML += `
      <div class="skill-card pixel-border">
        <div class="empty-slot">
          <div class="plus">＋</div>
          <span>${slot.hint}</span>
        </div>
      </div>
    `;
  });
}

// ========== Modal ==========
function openModal(id) {
  const skill = skills.find(s => s.id === id);
  if (!skill) return;
  const svgContent = getSvgContent(skill.svg);

  document.getElementById('modal-img').innerHTML = svgContent;
  document.getElementById('modal-title').textContent = skill.name;
  document.getElementById('modal-category').textContent = `🍽 ${skill.category}`;
  document.getElementById('modal-stars').innerHTML = starsHTML(skill.stars);
  document.getElementById('modal-exp-bar').style.width = skill.exp + '%';
  document.getElementById('modal-exp-text').textContent = skill.exp + '%';

  const notesEl = document.getElementById('modal-notes');
  if (skill.notes && skill.notes.length > 0) {
    notesEl.innerHTML = skill.notes.map(n =>
      `<li><span class="note-type ${n.type}">${n.type === 'tip' ? '💡 诀窍' : '💢 翻车'}</span>${n.text}</li>`
    ).join('');
  } else {
    notesEl.innerHTML = '<li style="font-size:8px;color:var(--text-muted);padding:8px;">还没有记录笔记呢 📝</li>';
  }

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ========== 事件绑定 ==========
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
});

// ========== 启动 ==========
loadSvgs();
// 如果 SVG 加载失败，fallback 渲染
setTimeout(() => { if (svgLoaded < svgFiles.length) renderGrid(); }, 500);
</script>
