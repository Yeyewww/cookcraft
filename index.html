<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CookCraft · 像素烹饪技能</title>
<style>
/* ===== 像素字体 ===== */
@font-face {
  font-family: 'Pixel';
  src: url('https://cdn.jsdelivr.net/npm/@fontsource/press-start-2p@5.1.0/files/press-start-2p-latin-400-normal.woff2') format('woff2');
  font-display: swap;
}
@font-face {
  font-family: 'Zpix';
  src: url('https://cdn.jsdelivr.net/npm/zpix@3.1.0/dist/Zpix.woff2') format('woff2');
  font-display: swap;
}

:root {
  --green: #6a994e;
  --amber: #d4a843;
  --red: #c45a4a;
  --bg: #f0e8d8;
  --card-bg: #fcf8f0;
  --border: #3a3a3a;
  --text: #2d2d2d;
  --text-dim: #8a8a8a;
  --star: #f0b429;
  --star-bg: #d5d0c4;
  --bar-bg: #d5d0c4;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body {
  font-family: 'Zpix', 'Pixel', 'Courier New', monospace;
  background: #e8e0d0;
  color: var(--text);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  image-rendering: pixelated;
  -webkit-font-smoothing: none;
}

/* ===== 16:9 面板 ===== */
.panel {
  width: 100vw;
  height: 100vh;
  max-width: 1280px;
  max-height: 720px;
  background: var(--bg);
  display: grid;
  grid-template-rows: 50px 40px 1fr 48px;
  border: 4px solid var(--border);
  overflow: hidden;
}

/* ===== 顶部栏 ===== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
  background: #2d2d2d;
  border-bottom: 4px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon {
  width: 28px; height: 28px;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff;
  border: 2px solid #4d7530;
}
.logo h1 {
  font-size: 16px; color: #fff;
  letter-spacing: 2px;
}
.top-right { display: flex; align-items: center; gap: 12px; }
.streak { font-size: 11px; color: var(--amber); }
.avatar {
  width: 32px; height: 32px;
  background: #e0d5c0; border: 2px solid #fff;
  overflow: hidden; flex-shrink: 0;
}
.avatar svg{width:100%;height:100%;display:block}

/* ===== 状态栏 ===== */
.status-bar {
  display: flex;
  align-items: stretch;
  background: var(--card-bg);
  border-bottom: 3px solid var(--border);
}
.stat {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 0 8px;
  border-right: 2px solid #ddd8cc;
  font-size: 12px; white-space: nowrap;
}
.stat:last-child{border:none}
.stat .n { font-size: 18px; color: var(--green); }
.stat .n.amber { color: var(--amber); }
.stat .lbl { font-size: 10px; color: var(--text-dim); }
.stat .goal-lbl { font-size: 10px; color: var(--text-dim); }
.minibar {
  width: 50px; height: 10px;
  background: var(--bar-bg); border: 2px solid var(--border);
}
.minibar-fill { height: 100%; background: var(--green); }

/* ===== 主区 ===== */
.main {
  display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg);
}

/* 筛选 */
.filter-row {
  display: flex; gap: 3px;
  padding: 6px 14px 4px;
  flex-shrink: 0;
}
.filter-btn {
  font-family: inherit;
  font-size: 11px; padding: 3px 10px;
  background: var(--card-bg);
  border: 3px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  line-height: 1.5;
}
.filter-btn:hover { background: #ede6d8; }
.filter-btn.active {
  background: var(--green); border-color: var(--green); color: #fff;
}

/* 网格 */
.grid-wrap {
  flex: 1; overflow-y: auto;
  padding: 4px 14px 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.grid-wrap::-webkit-scrollbar { width: 5px; }
.grid-wrap::-webkit-scrollbar-track { background: #ddd8cc; }
.grid-wrap::-webkit-scrollbar-thumb { background: var(--border); }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
  gap: 10px;
}

/* ===== 卡片 ===== */
.card {
  background: var(--card-bg);
  border: 3px solid var(--border);
  cursor: pointer;
  padding: 14px 10px 8px;
  display: flex; flex-direction: column; align-items: center;
  position: relative;
  transition: transform 0.06s steps(2);
}
.card:hover {
  transform: translate(-1px, -2px);
  box-shadow: -2px -2px 0 var(--border);
}
.card .img-box {
  width: 68px; height: 68px;
  margin-bottom: 6px;
  image-rendering: pixelated;
}
.card .img-box img { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
.card h3 {
  font-size: 12px; text-align: center;
  line-height: 1.4; margin-bottom: 4px;
  word-break: keep-all;
}
.card .stars { font-size: 12px; letter-spacing: 2px; margin-bottom: 4px; line-height: 1; }
.card .stars .on { color: var(--star); }
.card .stars .off { color: var(--star-bg); }
.card .tags { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
.card .tag {
  font-size: 9px; padding: 2px 6px;
  background: #ede6d8; border: 2px solid #d5cdbc;
  color: var(--text-dim); line-height: 1.3;
}
.card .tag.pro { background: #dde8c8; border-color: var(--green); color: var(--green); }
.card .tag.newb { background: #f5e8c8; border-color: var(--amber); color: #887000; }
.card .foot {
  font-size: 9px; color: var(--text-dim);
  margin-top: 8px; padding-top: 5px;
  border-top: 2px solid #e8e0d0;
  width: 100%; text-align: center;
}
.card.new-mark::after {
  content: 'NEW';
  position: absolute; top: 6px; right: 5px;
  background: var(--red); color: #fff;
  font-size: 8px; padding: 2px 6px;
  border: 2px solid #903020; line-height: 1;
}
/* 空位 */
.card.empty {
  border-style: dashed; border-color: #ccc4b0;
  background: transparent; cursor: default;
  justify-content: center; min-height: 150px; opacity: 0.45;
}
.card.empty .ep { font-size: 28px; color: #ccc4b0; line-height: 1; margin-bottom: 4px; }
.card.empty .et { font-size: 10px; color: #bbb4a0; }

/* ===== 底部栏 ===== */
.bottom-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 16px;
  background: #2d2d2d; border-top: 4px solid var(--border);
}
.challenge {
  display: flex; align-items: center; gap: 8px;
}
.challenge .icon {
  width: 26px; height: 26px;
  background: #f5e6c5; border: 2px solid var(--amber);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.challenge .txt { font-size: 11px; color: #fff; white-space: nowrap; }
.challenge .hl { color: var(--amber); }
.challenge-right {
  display: flex; align-items: center; gap: 10px;
}
.challenge-right .minibar { width: 70px; }
.challenge-right .minibar-fill.amber { background: var(--amber); }
.challenge-right .medal { font-size: 15px; }
.community-link {
  font-size: 10px; color: var(--amber);
  text-decoration: none; white-space: nowrap;
}
.community-link:hover { color: #f0d060; }

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  justify-content: center; align-items: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--card-bg);
  border: 4px solid var(--border);
  width: 460px; max-width: 90vw;
  padding: 22px 20px 18px;
  position: relative;
  box-shadow: 6px 6px 0 rgba(0,0,0,0.2);
}
.modal-close {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px;
  background: var(--card-bg); border: 3px solid var(--border);
  cursor: pointer; font-size: 12px; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim); line-height: 1;
}
.modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }
.modal-body {
  display: flex; gap: 16px;
  margin-bottom: 14px; align-items: flex-start;
}
.modal-img {
  width: 72px; height: 72px; flex-shrink: 0;
  border: 3px solid var(--border); background: var(--bg);
  image-rendering: pixelated;
}
.modal-img img { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
.modal-info { flex: 1; }
.modal-info h2 { font-size: 13px; margin-bottom: 2px; }
.modal-info .cat { font-size: 10px; color: var(--text-dim); margin-bottom: 5px; display: block; }
.modal-info .stars { font-size: 13px; letter-spacing: 2px; margin-bottom: 5px; }
.modal-info .stars .on { color: var(--star); }
.modal-info .stars .off { color: var(--star-bg); }
.exp-lbl { font-size: 9px; color: var(--text-dim); display: block; margin-bottom: 3px; }
.exp-bar {
  width: 100%; height: 12px;
  background: var(--bar-bg); border: 3px solid var(--border);
  position: relative; overflow: hidden;
}
.exp-fill { height: 100%; background: var(--green); transition: width 0.2s; }
.exp-txt {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: var(--text);
}
.notes { margin-top: 12px; }
.notes h4 { font-size: 10px; color: var(--text-dim); margin-bottom: 5px; }
.note-item {
  font-size: 9px; padding: 4px 6px;
  background: var(--bg); margin-bottom: 3px;
  border: 2px solid #ddd8cc;
  display: flex; gap: 4px; align-items: flex-start; line-height: 1.4;
}
.note-badge {
  font-size: 7px; padding: 1px 4px;
  background: var(--amber); color: #fff;
  flex-shrink: 0; margin-top: 1px;
  border: 1px solid #b08830; line-height: 1.2;
}
.note-badge.tip { background: var(--green); border-color: #4d7530; }
.note-badge.fail { background: var(--red); border-color: #903020; }
.note-empty { font-size: 9px; color: var(--text-dim); padding: 4px; }
</style>
</head>

<div class="modal-overlay" id="modal">

    <div class="notes">

      <div id="modal-notes"></div>
    </div>
  </div>
</div>

const empties = [
  {c:'热菜',h:'学一道新热菜'},{c:'甜品',h:'想做点甜品'},{c:'饮品',h:'解锁夏日饮品'}
];

let filt = 'all';

function stars(lv) {
  let r='';
  for(let i=1;i<=5;i++) r+=`<span class="${i<=lv?'on':'off'}">✦</span>`;
  return r;
}

function render() {
  const g = document.getElementById('grid');
  const list = filt==='all'?skills:skills.filter(x=>x.c===filt);
  const es = filt==='all'?empties:empties.filter(x=>x.c===filt);
  g.innerHTML = list.map(s=>{
    const isNew = s.e<50;
    return `<div class="card${isNew?' new-mark':''}" onclick="openModal(${s.id})">
      <div class="img-box"><img src="${imgs[s.p]||''}" alt="${s.n}"></div>
      <h3>${s.n}</h3>
      <div class="stars">${stars(s.s)}</div>
      <div class="tags">${s.t.map(t=>{
        let cl='tag';
        if(t==='拿手好菜'||t==='招牌') cl+=' pro';
        else if(t==='学习中') cl+=' newb';
        return `<span class="${cl}">${t}</span>`;
      }).join('')}</div>
      <div class="foot">${s.l} · 做过</div>
    </div>`;
  }).join('') + es.map(e=>`<div class="card empty"><div class="ep">＋</div><div class="et">${e.h}</div></div>`).join('');
}

function openModal(id) {
  const s = skills.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('modal-img').innerHTML = `<img src="${imgs[s.p]||''}" alt="${s.n}">`;
  document.getElementById('modal-title').textContent = s.n;
  document.getElementById('modal-cat').textContent = '🍽 '+s.c;
  document.getElementById('modal-stars').innerHTML = stars(s.s);
  document.getElementById('modal-exp-fill').style.width = s.e+'%';
  document.getElementById('modal-exp-txt').textContent = s.e+'%';
  const ne = document.getElementById('modal-notes');
  if(s.notes&&s.notes.length){
    ne.innerHTML = s.notes.map(n=>`<div class="note-item"><span class="note-badge ${n.k}">${n.k==='tip'?'💡诀窍':'💢翻车'}</span>${n.v}</div>`).join('');
  } else {
    ne.innerHTML = '<div class="note-empty">还没有记录笔记 📝</div>';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); filt=b.dataset.f; render();
  });
});
render();
</script>
